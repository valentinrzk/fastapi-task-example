version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER : app_user
      POSTGRES_PASSWORD : app_password
      POSTGRES_HOST : db
      POSTGRES_PORT : 5432
      POSTGRES_DB : app_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_app
    depends_on:
      - db
    environment:
      POSTGRES_USER : app_user
      POSTGRES_PASSWORD : app_password
      POSTGRES_HOST : db
      POSTGRES_PORT : 5432
      POSTGRES_DB : app_db
    labels:
      - "logging=promtail"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["./wait-for-db.sh"]

  loki:
    image: grafana/loki:2.9.8
    command: [ "-config.file=/etc/loki/loki-config.yaml" ]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
      - web

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/prometheus-config.yaml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources/loki.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
    ports:
      - "3000:3000"
    depends_on:
      - loki

volumes:
  db_data:
  loki_data:
  prometheus_data:
  grafana_data: